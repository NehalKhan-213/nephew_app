<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Talking Nouman</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif;
              background:radial-gradient(circle at 50% 30%, #2b3a67 0%, #141b33 70%); }
  #stage { position:absolute; inset:0; touch-action:none; }
  canvas { position:absolute; inset:0; width:100%; height:100%; }

  #topbar {
    position:absolute; top:0; left:0; right:0; z-index:10;
    display:flex; gap:8px; padding:10px; flex-wrap:wrap; justify-content:center;
    background:linear-gradient(to bottom, rgba(0,0,0,.45), transparent);
  }
  .btn {
    border:none; border-radius:20px; padding:9px 16px; font-size:14px; font-weight:600;
    background:rgba(255,255,255,.14); color:#fff; cursor:pointer; backdrop-filter:blur(6px);
    transition:background .15s, transform .1s;
  }
  .btn:active { transform:scale(.94); }
  .btn.active { background:#ffb300; color:#222; }
  select.btn { appearance:none; }
  select.btn option { color:#222; }

  #bubble {
    position:absolute; left:50%; transform:translateX(-50%); top:70px; z-index:9;
    max-width:82%; padding:12px 18px; border-radius:18px; font-size:16px; line-height:1.35;
    background:rgba(255,255,255,.94); color:#222; box-shadow:0 6px 24px rgba(0,0,0,.35);
    opacity:0; transition:opacity .25s; pointer-events:none;
  }
  #bubble.show { opacity:1; }
  #bubble::after {
    content:''; position:absolute; bottom:-9px; left:50%; margin-left:-9px;
    border-left:9px solid transparent; border-right:9px solid transparent;
    border-top:10px solid rgba(255,255,255,.94);
  }

  #bottombar {
    position:absolute; bottom:0; left:0; right:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; gap:8px; padding:14px 10px 22px;
    background:linear-gradient(to top, rgba(0,0,0,.55), transparent);
  }
  #status { color:#cfd8ff; font-size:14px; min-height:20px; text-shadow:0 1px 3px #000; }
  #micBtn {
    width:84px; height:84px; border-radius:50%; border:none; cursor:pointer; font-size:38px;
    background:linear-gradient(145deg,#ff9500,#ff5e3a); color:#fff;
    box-shadow:0 6px 20px rgba(255,110,50,.5), inset 0 -3px 8px rgba(0,0,0,.25);
    transition:transform .12s;
  }
  #micBtn:active { transform:scale(.92); }
  #micBtn.listening { animation:pulse 1s infinite; background:linear-gradient(145deg,#ff3b30,#c62828); }
  @keyframes pulse {
    0%,100% { box-shadow:0 0 0 0 rgba(255,59,48,.6); }
    50%     { box-shadow:0 0 0 22px rgba(255,59,48,0); }
  }
  #hint {
    position:absolute; left:50%; transform:translateX(-50%); bottom:140px; z-index:9;
    color:#ffd54f; font-size:14px; font-weight:600; text-shadow:0 1px 4px #000;
    background:rgba(0,0,0,.4); padding:8px 14px; border-radius:14px; display:none;
  }
  #fileInput { display:none; }
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas></div>

<div id="topbar">
  <button class="btn" id="photoBtn">📷 My Photo</button>
  <button class="btn" id="adjustBtn">🎯 Adjust Face</button>
  <button class="btn active" id="repeatBtn">🔁 Repeat</button>
  <button class="btn" id="answerBtn">💬 Answer</button>
  <select class="btn" id="langSel">
    <option value="en-US">English</option>
    <option value="en-IN">English (India)</option>
    <option value="hi-IN">हिन्दी</option>
    <option value="bn-BD">বাংলা</option>
    <option value="ur-IN">اردو</option>
  </select>
</div>

<div id="bubble"></div>
<div id="hint"></div>

<div id="bottombar">
  <div id="status">Tap the mic and speak — I will talk back!</div>
  <button id="micBtn">🎤</button>
</div>

<input type="file" id="fileInput" accept="image/*">

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const micBtn = document.getElementById('micBtn');
const statusEl = document.getElementById('status');
const bubble = document.getElementById('bubble');
const hint = document.getElementById('hint');

const langSel = document.getElementById('langSel');

let img = null;                 // the character photo
let imgRect = {x:0,y:0,w:0,h:0};// where the photo is drawn on canvas
// Normalized (0..1 of the image) face landmarks. Defaults are calibrated
// for the built-in photo (DEFAULT_PHOTO below).
let pts = {
  leftEye: {x:0.434, y:0.249},
  rightEye:{x:0.578, y:0.256},
  mouth:   {x:0.501, y:0.333},
  chin:    {x:0.496, y:0.406}
};
let skinL = '#caa088', skinR = '#caa088';

let mode = 'repeat';            // 'repeat' | 'answer'
let adjustMode = false;
let dragKey = null;

let talking = false;            // TTS currently playing
let listening = false;
let mouthOpen = 0, mouthTarget = 0, nextMouthChange = 0;
let blink = 0, nextBlink = performance.now() + 2000;
const jawBuf = document.createElement('canvas');   // offscreen buffer for the jaw strip

/* ---------------- persistence ---------------- */
function saveState() {
  try {
    localStorage.setItem('ttm_points', JSON.stringify(pts));
  } catch(e) {}
}
function loadState() {
  try {
    const p = localStorage.getItem('ttm_points');
    if (p) pts = JSON.parse(p);
    const d = localStorage.getItem('ttm_photo');
    const im = new Image();
    im.onload = () => { img = im; sampleSkin(); };
    im.src = d || DEFAULT_PHOTO;   // built-in photo until the user adds one
  } catch(e) {}
}

/* ---------------- photo loading ---------------- */
document.getElementById('photoBtn').onclick = () => fileInput.click();
fileInput.onchange = () => {
  const f = fileInput.files[0];
  if (!f) return;
  if (/\.(heic|heif)$/i.test(f.name)) {
    showBubble('HEIC photos cannot be read by the browser. Please save the photo as JPG first (open it in the Photos app → Save as → JPG), then add it again.', 6000);
    return;
  }
  const url = URL.createObjectURL(f);
  const im = new Image();
  im.onload = async () => {
    URL.revokeObjectURL(url);
    // downscale so it fits in localStorage
    const maxDim = 1100;
    const s = Math.min(1, maxDim / Math.max(im.width, im.height));
    const oc = document.createElement('canvas');
    oc.width = Math.round(im.width*s); oc.height = Math.round(im.height*s);
    oc.getContext('2d').drawImage(im, 0, 0, oc.width, oc.height);
    const small = new Image();
    small.onload = async () => {
      img = small;
      try { localStorage.setItem('ttm_photo', oc.toDataURL('image/jpeg', 0.86)); } catch(e) {}
      const found = await autoDetectFace(oc);
      sampleSkin();
      if (found) {
        showBubble('Face detected automatically! Tap 🎯 Adjust Face if the mouth or eyes are not exactly right.', 5000);
      } else {
        setAdjust(true);
        showBubble('Drag the dots onto the eyes, mouth and chin, then tap 🎯 again to finish.', 6000);
      }
    };
    small.src = oc.toDataURL('image/jpeg', 0.86);
  };
  im.onerror = () => showBubble('Could not read that image. Please use a JPG or PNG photo.', 5000);
  im.src = url;
  fileInput.value = '';
};

async function autoDetectFace(canvasEl) {
  if (!('FaceDetector' in window)) return false;
  try {
    const fd = new FaceDetector({ maxDetectedFaces: 1 });
    const faces = await fd.detect(canvasEl);
    if (!faces.length) return false;
    const f = faces[0];
    const W = canvasEl.width, H = canvasEl.height;
    let eyeL = null, eyeR = null, mouth = null;
    for (const lm of (f.landmarks || [])) {
      const loc = lm.locations[0];
      if (lm.type === 'eye')  { if (!eyeL) eyeL = loc; else eyeR = loc; }
      if (lm.type === 'mouth') mouth = loc;
    }
    if (eyeL && eyeR && mouth) {
      if (eyeL.x > eyeR.x) [eyeL, eyeR] = [eyeR, eyeL];
      pts.leftEye  = {x: eyeL.x/W,  y: eyeL.y/H};
      pts.rightEye = {x: eyeR.x/W,  y: eyeR.y/H};
      pts.mouth    = {x: mouth.x/W, y: mouth.y/H};
      const eyeMidY = (eyeL.y + eyeR.y)/2;
      pts.chin     = {x: mouth.x/W, y: Math.min(0.98, (mouth.y + (mouth.y - eyeMidY)*0.55)/H)};
      saveState();
      return true;
    }
    // bounding box only: estimate
    const b = f.boundingBox;
    pts.leftEye  = {x:(b.x + b.width*0.32)/W, y:(b.y + b.height*0.42)/H};
    pts.rightEye = {x:(b.x + b.width*0.68)/W, y:(b.y + b.height*0.42)/H};
    pts.mouth    = {x:(b.x + b.width*0.50)/W, y:(b.y + b.height*0.78)/H};
    pts.chin     = {x:(b.x + b.width*0.50)/W, y:(b.y + b.height*0.98)/H};
    saveState();
    return true;
  } catch(e) { return false; }
}

function sampleSkin() {
  if (!img) return;
  const oc = document.createElement('canvas');
  oc.width = img.width; oc.height = img.height;
  const octx = oc.getContext('2d');
  octx.drawImage(img, 0, 0);
  const grab = (p) => {
    // sample the cheek just below the eye — above it is eyebrow/hair
    const x = Math.round(p.x * img.width);
    const y = Math.round(Math.min(img.height - 2, (p.y + 0.038) * img.height));
    try {
      const d = octx.getImageData(x, y, 3, 3).data;
      let r=0,g=0,b=0; for (let i=0;i<9;i++){ r+=d[i*4]; g+=d[i*4+1]; b+=d[i*4+2]; }
      return `rgb(${Math.round(r/9)},${Math.round(g/9)},${Math.round(b/9)})`;
    } catch(e) { return '#caa088'; }
  };
  skinL = grab(pts.leftEye);
  skinR = grab(pts.rightEye);
}

/* ---------------- layout helpers ---------------- */
function resize() {
  cv.width = innerWidth * devicePixelRatio;
  cv.height = innerHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
addEventListener('resize', resize);

function computeImgRect() {
  const W = innerWidth, H = innerHeight;
  if (!img) { imgRect = {x:0,y:0,w:W,h:H}; return; }
  const s = Math.min(W / img.width, H / img.height);
  const w = img.width * s, h = img.height * s;
  imgRect = { x:(W-w)/2, y:(H-h)/2, w, h };
}
const P = (p) => ({ x: imgRect.x + p.x*imgRect.w, y: imgRect.y + p.y*imgRect.h });

/* ---------------- drawing ---------------- */
function draw(now) {
  const W = innerWidth, H = innerHeight;
  ctx.clearRect(0, 0, W, H);
  computeImgRect();

  // --- animation envelopes ---
  if (talking) {
    if (now > nextMouthChange) {
      mouthTarget = 0.25 + Math.random()*0.75;
      nextMouthChange = now + 70 + Math.random()*90;
    }
  } else mouthTarget = 0;
  mouthOpen += (mouthTarget - mouthOpen) * 0.35;

  if (now > nextBlink) {
    const t = (now - nextBlink) / 160;           // 160 ms blink
    blink = t < 0.5 ? t*2 : Math.max(0, 2 - t*2);
    if (t > 1) { blink = 0; nextBlink = now + 1800 + Math.random()*3200; }
  }

  const tS = now/1000;
  const sway   = Math.sin(tS*0.9)*0.014 + (talking ? Math.sin(tS*7)*0.008 : 0);
  const breath = 1 + 0.006*Math.sin(tS*1.6) + (talking ? 0.008*Math.sin(tS*9) : 0);
  const bob    = talking ? Math.sin(tS*8)*3 : Math.sin(tS*1.6)*1.5;

  ctx.save();
  // pivot at bottom-center so the character sways like a body
  ctx.translate(W/2, H);
  ctx.rotate(sway);
  ctx.scale(breath, breath);
  ctx.translate(-W/2, -H + bob);

  if (img) {
    ctx.drawImage(img, imgRect.x, imgRect.y, imgRect.w, imgRect.h);
    drawFace();
  } else {
    drawPlaceholder(W, H);
  }
  ctx.restore();

  if (adjustMode) drawAdjustDots();
  requestAnimationFrame(draw);
}

function drawFace() {
  const eL = P(pts.leftEye), eR = P(pts.rightEye), m = P(pts.mouth), ch = P(pts.chin);
  const eyeDist = Math.max(10, Math.hypot(eR.x - eL.x, eR.y - eL.y));

  // ---- jaw drop: shift the chin strip of the photo downward ----
  const jawSpan = Math.max(8, ch.y - m.y);
  const drop = mouthOpen * jawSpan * 0.42;
  if (drop > 0.5) {
    const mw = eyeDist * 0.62;
    const sliceTop = m.y + eyeDist*0.08;               // just below lower lip
    const sliceBot = ch.y + jawSpan*0.35;              // stop just past the chin
    const sliceH = sliceBot - sliceTop;
    // convert canvas rect -> source pixels of the image
    const sx = (m.x - mw - imgRect.x) / imgRect.w * img.width;
    const sy = (sliceTop - imgRect.y) / imgRect.h * img.height;
    const sw = (2*mw) / imgRect.w * img.width;
    const sh = sliceH / imgRect.h * img.height;
    if (sw > 0 && sh > 0) {
      // draw the strip into an offscreen buffer and feather its borders
      // so the shifted jaw blends into the photo with no hard edges
      jawBuf.width = Math.ceil(2*mw); jawBuf.height = Math.ceil(sliceH);
      const jc = jawBuf.getContext('2d');
      jc.clearRect(0, 0, jawBuf.width, jawBuf.height);
      jc.drawImage(img, sx, sy, sw, sh, 0, 0, jawBuf.width, jawBuf.height);
      jc.globalCompositeOperation = 'destination-out';
      const fx = jawBuf.width * 0.22, fy = jawBuf.height * 0.28;
      let g2 = jc.createLinearGradient(0, 0, fx, 0);
      g2.addColorStop(0, 'rgba(0,0,0,1)'); g2.addColorStop(1, 'rgba(0,0,0,0)');
      jc.fillStyle = g2; jc.fillRect(0, 0, fx, jawBuf.height);
      g2 = jc.createLinearGradient(jawBuf.width, 0, jawBuf.width - fx, 0);
      g2.addColorStop(0, 'rgba(0,0,0,1)'); g2.addColorStop(1, 'rgba(0,0,0,0)');
      jc.fillStyle = g2; jc.fillRect(jawBuf.width - fx, 0, fx, jawBuf.height);
      g2 = jc.createLinearGradient(0, jawBuf.height, 0, jawBuf.height - fy);
      g2.addColorStop(0, 'rgba(0,0,0,1)'); g2.addColorStop(1, 'rgba(0,0,0,0)');
      jc.fillStyle = g2; jc.fillRect(0, jawBuf.height - fy, jawBuf.width, fy);
      jc.globalCompositeOperation = 'source-over';
      ctx.drawImage(jawBuf, m.x - mw, sliceTop + drop);
    }
  }

  // ---- open mouth (interior + teeth + tongue) ----
  if (mouthOpen > 0.03) {
    const cxm = m.x, cym = m.y + drop*0.5;
    const rx = eyeDist * 0.33 * (0.8 + 0.2*mouthOpen);
    const ry = Math.max(2, mouthOpen * eyeDist * 0.28);
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cxm, cym, rx, ry, 0, 0, Math.PI*2);
    ctx.clip();
    // interior
    const g = ctx.createRadialGradient(cxm, cym, ry*0.2, cxm, cym, rx);
    g.addColorStop(0, '#5a1418');
    g.addColorStop(1, '#2e0a0d');
    ctx.fillStyle = g;
    ctx.fillRect(cxm - rx, cym - ry, rx*2, ry*2);
    // teeth
    if (ry > 6) {
      ctx.fillStyle = '#f5f2e9';
      ctx.beginPath();
      ctx.ellipse(cxm, cym - ry*0.85, rx*0.8, ry*0.42, 0, 0, Math.PI*2);
      ctx.fill();
    }
    // tongue
    if (ry > 5) {
      ctx.fillStyle = '#c94b52';
      ctx.beginPath();
      ctx.ellipse(cxm, cym + ry*0.75, rx*0.58, ry*0.55, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
    // soft lip outline
    ctx.strokeStyle = 'rgba(110,55,50,0.55)';
    ctx.lineWidth = Math.max(2, eyeDist*0.03);
    ctx.beginPath();
    ctx.ellipse(cxm, cym, rx, ry, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  // ---- blinking eyelids ----
  if (blink > 0.05) {
    const ew = eyeDist * 0.23, eh = eyeDist * 0.12 * blink;
    for (const [e, skin] of [[eL, skinL], [eR, skinR]]) {
      ctx.fillStyle = skin;
      ctx.beginPath();
      ctx.ellipse(e.x, e.y, ew, Math.max(1.5, eh), 0, 0, Math.PI*2);
      ctx.fill();
      if (blink > 0.7) {
        ctx.strokeStyle = 'rgba(60,35,25,.5)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(e.x, e.y + eh*0.4, ew*0.9, 1, 0, 0, Math.PI);
        ctx.stroke();
      }
    }
  }
}

function drawPlaceholder(W, H) {
  // simple cartoon face so the app works before a photo is added
  const cx0 = W/2, cy0 = H*0.42, R = Math.min(W, H)*0.22;
  ctx.fillStyle = '#f5c396';
  ctx.beginPath(); ctx.arc(cx0, cy0, R, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3b2a20';
  const eo = R*0.38, er = R*0.09*(1 - blink*0.9);
  ctx.beginPath(); ctx.ellipse(cx0-eo, cy0-R*0.15, R*0.09, Math.max(1,er), 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx0+eo, cy0-R*0.15, R*0.09, Math.max(1,er), 0, 0, Math.PI*2); ctx.fill();
  const ry = R*(0.06 + mouthOpen*0.28);
  ctx.fillStyle = '#7c2d33';
  ctx.beginPath(); ctx.ellipse(cx0, cy0+R*0.45, R*0.3, ry, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.font = '600 16px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillText('Tap 📷 My Photo to become the character!', cx0, cy0 + R*1.7);
}

/* ---------------- adjust (calibration) mode ---------------- */
const DOT_LABELS = { leftEye:'👁 Left eye', rightEye:'👁 Right eye', mouth:'👄 Mouth', chin:'⬇ Chin' };
function drawAdjustDots() {
  for (const k of Object.keys(DOT_LABELS)) {
    const p = P(pts[k]);
    ctx.fillStyle = k === dragKey ? '#ffd54f' : 'rgba(0,220,130,.95)';
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y, 11, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = '600 12px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText(DOT_LABELS[k], p.x, p.y - 16);
  }
}
function setAdjust(on) {
  adjustMode = on;
  document.getElementById('adjustBtn').classList.toggle('active', on);
  hint.style.display = on ? 'block' : 'none';
  hint.textContent = on ? 'Drag the green dots onto the eyes, mouth and chin' : '';
  if (!on) { saveState(); sampleSkin(); }
}
document.getElementById('adjustBtn').onclick = () => setAdjust(!adjustMode);

cv.parentElement.addEventListener('pointerdown', (ev) => {
  const x = ev.clientX, y = ev.clientY;
  if (adjustMode) {
    let best = null, bd = 40;
    for (const k of Object.keys(DOT_LABELS)) {
      const p = P(pts[k]);
      const d = Math.hypot(p.x-x, p.y-y);
      if (d < bd) { bd = d; best = k; }
    }
    dragKey = best;
  } else if (!listening) {
    poke();
  }
});
addEventListener('pointermove', (ev) => {
  if (!dragKey) return;
  pts[dragKey] = {
    x: Math.min(1, Math.max(0, (ev.clientX - imgRect.x) / imgRect.w)),
    y: Math.min(1, Math.max(0, (ev.clientY - imgRect.y) / imgRect.h))
  };
});
addEventListener('pointerup', () => { if (dragKey) { dragKey = null; saveState(); } });

/* ---------------- speech: output ---------------- */
let voices = [];
function refreshVoices() { voices = speechSynthesis.getVoices(); }
refreshVoices();
speechSynthesis.onvoiceschanged = refreshVoices;

function pickVoice(lang) {
  const pre = lang.split('-')[0];
  return voices.find(v => v.lang === lang)
      || voices.find(v => v.lang && v.lang.startsWith(pre))
      || null;
}

function speak(text, { pitch = 1.7, rate = 1.05 } = {}) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const v = pickVoice(langSel.value);
  if (v) u.voice = v;
  u.lang = langSel.value;
  u.pitch = pitch; u.rate = rate;
  u.onstart = () => { talking = true; setStatus('🗣 Speaking…'); };
  const done = () => { talking = false; setStatus('Tap the mic and speak!'); };
  u.onend = done; u.onerror = done;
  showBubble(text, Math.max(2500, text.length * 70));
  speechSynthesis.speak(u);
}

/* ---------------- speech: input ---------------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;
if (SR) {
  rec = new SR();
  rec.continuous = false;
  rec.interimResults = false;
  rec.onresult = (e) => {
    const text = e.results[0][0].transcript.trim();
    stopListening();
    if (text) respond(text);
  };
  rec.onerror = (e) => {
    stopListening();
    if (e.error === 'not-allowed') setStatus('⚠️ Microphone blocked — allow mic access in the browser.');
    else if (e.error === 'no-speech') setStatus("I didn't hear anything — try again!");
    else setStatus('Mic error: ' + e.error);
  };
  rec.onend = () => stopListening();
}

function startListening() {
  if (!rec) {
    showBubble('This browser has no speech recognition. Please use Google Chrome or Microsoft Edge.', 5000);
    return;
  }
  speechSynthesis.cancel(); talking = false;
  rec.lang = langSel.value;
  try { rec.start(); } catch(e) { return; }
  listening = true;
  micBtn.classList.add('listening');
  setStatus('🎙 Listening… say something!');
}
function stopListening() {
  listening = false;
  micBtn.classList.remove('listening');
  if (!talking) setStatus('Tap the mic and speak!');
}
micBtn.onclick = () => listening ? (rec && rec.stop()) : startListening();

/* ---------------- brain ---------------- */
function respond(heard) {
  setStatus('Heard: “' + heard + '”');
  if (mode === 'repeat') {
    speak(heard, { pitch: 1.85, rate: 1.1 });    // classic Talking-Tom squeaky repeat
  } else {
    speak(botReply(heard), { pitch: 1.6, rate: 1.0 });
  }
}

const JOKES = [
  "Why did the banana go to the doctor? Because it was not peeling well! Ha ha ha!",
  "What do you call a fish with no eyes? A fsh! Hee hee!",
  "Why did the computer go to school? To improve its byte! Ha ha!",
  "Knock knock! Who's there? Cow says. Cow says who? No silly, cow says moo!"
];
function botReply(t) {
  const s = t.toLowerCase();
  const name = CHARACTER.name;
  if (/\b(hello|hi|hey|salam|assalam|namaste|namaskar)\b/.test(s))
    return `Hello hello! I am ${name}! So happy to see you!`;
  if (/your name|who are you|tum kaun|tumhara naam|tomar naam/.test(s))
    return `My name is ${name}! And I love to talk. What is your name?`;
  if (/how old|your age|kitne saal|koto bochor/.test(s))
    return `I am ${CHARACTER.age} years old! Almost a big boy!`;
  if (/how are you|kaise ho|kemon acho/.test(s))
    return `I am super duper great! Thank you for asking. How are you?`;
  if (/\bjoke\b|funny|hasao|mazak/.test(s))
    return JOKES[Math.floor(Math.random()*JOKES.length)];
  if (/\bsing\b|gana|gaan/.test(s))
    return "La la la, la la laaa! Twinkle twinkle little star! La la laaa! Did you like my song?";
  if (/i love you|love u/.test(s))
    return `Aww! I love you too! You are my best friend!`;
  if (/\btime\b|what.*clock|samay|somoy/.test(s))
    return 'The time is ' + new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) + '!';
  if (/\bdate\b|today|which day|aaj/.test(s))
    return 'Today is ' + new Date().toLocaleDateString([], {weekday:'long', day:'numeric', month:'long'}) + '!';
  if (/bye|good night|goodnight|khuda hafiz|allah hafez/.test(s))
    return 'Bye bye! Come back soon to play with me!';
  const math = s.replace(/plus/g,'+').replace(/minus/g,'-')
                .replace(/times|multiplied by|into/g,'*').replace(/divided by/g,'/')
                .match(/(-?\d+(?:\.\d+)?)\s*([-+*/x×÷])\s*(-?\d+(?:\.\d+)?)/);
  if (math) {
    const a = parseFloat(math[1]), b = parseFloat(math[3]);
    const op = math[2].replace('x','*').replace('×','*').replace('÷','/');
    const r = op==='+'?a+b : op==='-'?a-b : op==='*'?a*b : (b!==0 ? a/b : null);
    const opWord = {'+':'plus','-':'minus','*':'times','/':'divided by'}[op];
    if (r !== null) return `That is easy! ${math[1]} ${opWord} ${math[3]} is ${Math.round(r*100)/100}!`;
    return 'You cannot divide by zero, silly!';
  }
  const fallback = [
    `Hmm, you said "${t}". That sounds interesting! Tell me more!`,
    `"${t}"? Hee hee, I like the way you talk!`,
    `Wow! ${t}! That is so cool!`
  ];
  return fallback[Math.floor(Math.random()*fallback.length)];
}

/* ---------------- poke reactions ---------------- */
const POKES = [
  'Hee hee, that tickles!',
  'Ouch! Why did you poke me?',
  'Hey! Stop poking me! Ha ha!',
  'Hehehe! Do it again, do it again!'
];
let lastPoke = 0;
function poke() {
  const now = Date.now();
  if (now - lastPoke < 1500 || talking) return;
  lastPoke = now;
  speak(POKES[Math.floor(Math.random()*POKES.length)], { pitch: 1.9, rate: 1.15 });
}

/* ---------------- UI wiring ---------------- */
function setStatus(t) { statusEl.textContent = t; }
let bubbleTimer = null;
function showBubble(t, ms) {
  bubble.textContent = t;
  bubble.classList.add('show');
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => bubble.classList.remove('show'), ms || 3000);
}
document.getElementById('repeatBtn').onclick = () => setMode('repeat');
document.getElementById('answerBtn').onclick = () => setMode('answer');
function setMode(m2) {
  mode = m2;
  document.getElementById('repeatBtn').classList.toggle('active', m2==='repeat');
  document.getElementById('answerBtn').classList.toggle('active', m2==='answer');
  setStatus(m2 === 'repeat' ? 'Repeat mode: I copy you in a funny voice!' : 'Answer mode: ask me anything!');
}

/* ---------------- go ---------------- */
loadState();
resize();
requestAnimationFrame(draw);
</script>
